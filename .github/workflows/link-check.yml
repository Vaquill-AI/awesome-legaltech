name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,206,429,202
            --exclude-loopback
            --exclude 'mailto:'
            --exclude 'localhost'
            --exclude 'pacer.uscourts.gov'
            --exclude 'indiankanoon.org'
            --exclude 'scdb.wustl.edu'
            --exclude 'legalweek.com'
            --exclude 'law.com'
            --exclude 'pro.bloomberglaw.com'
            --exclude 'capterra.com'
            --exclude 'g2.com'
            --exclude 'softwareadvice.com'
            --exclude 'getapp.com'
            --exclude 'lexisnexis.com'
            --exclude 'westlaw.com'
            --exclude 'store.law.com'
            --exclude 'nevo.co.il'
            --exclude 'portal.stf.jus.br'
            --exclude 'law.pku.edu.cn'
            --exclude 'glaw.scourt.go.kr'
            --exclude 'manupatra.com'
            --exclude 'free.law'
            --exclude 'clio.com'
            --exclude 'drata.com'
            --timeout 30
            --max-retries 3
            README.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
